<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Ứng Dụng ATV</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { 
            font-family: "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #0f172a; 
            color: #f3f4f6; 
            overflow: hidden; /* Khóa màn hình chính, chỉ cuộn nội bộ 2 cột */
            height: 100vh;
        }

        /* LAYOUT 2 CỘT CHUYÊN NGHIỆP CHO TV */
        .tv-layout {
            display: flex;
            height: calc(100vh - 120px); /* Chừa chỗ cho header */
            margin-top: 20px;
            gap: 24px;
        }

        /* CỘT MENU TRÁI */
        .menu-side {
            width: 280px;
            flex-shrink: 0;
            overflow-y: auto;
            padding-right: 8px;
            border-right: 2px solid #1e293b;
        }

        /* CỘT NỘI DUNG PHẢI */
        .content-side {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 50px;
        }
        
        /* STYLE NÚT MENU TRÁI */
        .menu-item {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 12px;
            background: #1e293b;
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid transparent;
            transition: all 0.15s ease-in-out;
            outline: none;
        }

        /* KHI REMOTE CHỌN TRÚNG MENU TRÁI */
        .menu-item:focus {
            background: #2563eb !important;
            color: #ffffff !important;
            border-color: #60a5fa !important;
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.6);
        }

        /* STYLE THẺ APP BÊN PHẢI */
        .tv-focusable {
            outline: none;
            border: 2px solid transparent;
            transition: transform 0.15s ease-in-out, border-color 0.15s, box-shadow 0.15s;
        }
        
        /* KHI REMOTE CHỌN TRÚNG APP */
        .tv-focusable:focus {
            transform: scale(1.04);
            border-color: #3b82f6 !important;
            background-color: #1e3a8a !important; 
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5) !important;
        }

        /* Ẩn thanh cuộn để giao diện TV sạch đẹp */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="px-8 pt-6">

    <div id="loading-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-900 bg-opacity-95">
        <p class="text-xl font-bold text-blue-400 animate-pulse">Đang kết nối kho ứng dụng...</p>
    </div>

    <header class="flex justify-between items-center border-b border-gray-800 pb-4">
        <div>
            <h1 class="text-3xl font-black text-blue-500 tracking-wide">KHO ỨNG DỤNG ANDROID TV</h1>
            <p class="text-sm text-gray-400 mt-1">Giao diện tối ưu cho mọi phiên bản WebView</p>
        </div>
        <div class="text-right text-xs text-gray-500">
            Dùng Remote: <span class="text-gray-300">Trái/Phải</span> để chuyển cột
        </div>
    </header>

    <div class="tv-layout">
        <div id="menu-side" class="menu-side"></div>
        
        <div id="content-side" class="content-side"></div>
    </div>

    <script>
        const WORKER_URL = "https://twilight-water-52c0.nguyentuanhihihi.workers.dev/"; 
        const R2_PUBLIC_URL = "https://pub-f2fd372ec0c34231b4e0a24526bdb379.r2.dev"; 

        const LOADING_OVERLAY = document.getElementById('loading-overlay');
        const MENU_SIDE = document.getElementById('menu-side');
        const CONTENT_SIDE = document.getElementById('content-side');
        
        let appDataStructure = {};
        let codeMapping = {};
        let folderFriendlyNames = {};
        let fileFriendlyNames = {}; 
        let iconMapping = {};

        async function init() {
            try {
                const response = await fetch(WORKER_URL);
                const data = await response.json();
                
                codeMapping = data.codes || {};
                folderFriendlyNames = data.folderMappings || {};
                fileFriendlyNames = data.fileMappings || {}; 
                iconMapping = data.icons || {};

                const objects = data.objects || [];
                appDataStructure = {};

                objects.forEach(obj => {
                    if (obj.key.endsWith(".json") || obj.key.endsWith(".png") || obj.key.endsWith(".jpg") || obj.key.endsWith(".webp") || obj.key.endsWith(".keep")) return;
                    
                    const parts = obj.key.split('/');
                    let category = parts.length >= 2 ? parts[0] : "Khác";
                    let subcategory = parts.length >= 3 ? parts[1] : null;

                    if (!appDataStructure[category]) appDataStructure[category] = { _files: [], _subs: {} };

                    if (subcategory) {
                        if (!appDataStructure[category]._subs[subcategory]) appDataStructure[category]._subs[subcategory] = [];
                        appDataStructure[category]._subs[subcategory].push(obj);
                    } else {
                        appDataStructure[category]._files.push(obj);
                    }
                });

                renderInterface();
            } catch (err) {
                CONTENT_SIDE.innerHTML = '<p class="text-red-500 text-xl font-bold">Lỗi tải dữ liệu!</p>';
            } finally {
                LOADING_OVERLAY.classList.add('hidden');
            }
        }

        function getFolderName(slug) {
            return folderFriendlyNames[slug] || slug.toUpperCase().replace(/_/g, ' ');
        }

        // VẼ MENU TRÁI
        function renderInterface() {
            MENU_SIDE.innerHTML = "";
            const categories = Object.keys(appDataStructure);
            
            categories.forEach((catSlug, index) => {
                const btn = document.createElement('button');
                btn.className = "menu-item tv-focusable-item";
                btn.innerText = getFolderName(catSlug);
                btn.setAttribute('tabindex', '0');
                btn.setAttribute('data-slug', catSlug);
                
                // Khi remote di chuyển vào mục menu nào, bên phải tự đổi nội dung luôn
                btn.onfocus = () => {
                    renderAppContent(catSlug);
                };
                
                MENU_SIDE.appendChild(btn);
            });

            // Tự động focus ô menu đầu tiên khi mở app
            if (categories.length > 0) {
                setTimeout(() => { MENU_SIDE.querySelector('.menu-item').focus(); }, 300);
            }
        }

        // VẼ KHO APP BÊN PHẢI
        function renderAppContent(catSlug) {
            CONTENT_SIDE.innerHTML = `<h2 class="text-xl font-bold text-blue-400 mb-4 px-2">${getFolderName(catSlug)}</h2>`;
            
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-2 gap-4"; // Chia 2 cột dọc tải file cho rộng rãi trên TV
            grid.id = "app-grid";
            
            const catData = appDataStructure[catSlug];
            let allApps = [...catData._files];
            Object.values(catData._subs).forEach(subList => allApps.push(...subList));
            
            if(allApps.length === 0) {
                CONTENT_SIDE.innerHTML += `<p class="text-gray-500 italic pl-2">Chưa có ứng dụng trong mục này.</p>`;
                return;
            }

            allApps.forEach(file => {
                const rawFileName = file.key.split('/').pop();
                const defaultName = rawFileName.replace(/\.apk$/i, '').replace(/_/g, ' ');
                const cleanName = fileFriendlyNames[file.key] || defaultName;
                
                const initialLetter = cleanName.trim().charAt(0).toUpperCase();
                let avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(initialLetter)}&background=1e293b&color=38bdf8&bold=true&size=128`;
                if (iconMapping[file.key]) avatarUrl = `${R2_PUBLIC_URL}/${iconMapping[file.key]}`;
                
                const fileCode = codeMapping[file.key] || "K có";
                const fileUrl = `${R2_PUBLIC_URL}/${file.key}`;

                const card = document.createElement('a');
                card.setAttribute('tabindex', '0');
                card.className = "tv-focusable block bg-gray-800/80 border border-gray-700 rounded-xl p-4 flex items-center justify-between shadow-md cursor-pointer";
                card.innerHTML = `
                    <div class="flex items-center space-x-3 min-w-0 flex-1">
                        <img src="${avatarUrl}" class="w-12 h-12 rounded-lg object-cover" alt="Icon">
                        <div class="min-w-0 flex-1">
                            <h3 class="text-md font-bold text-gray-200 truncate">${cleanName}</h3>
                            <p class="text-xs text-gray-400 mt-0.5 font-mono">CODE: <span class="text-yellow-400 font-bold">${fileCode}</span></p>
                        </div>
                    </div>
                `;

                // Tự động cuộn mượt mà theo tâm màn hình khi lướt xem app
                card.addEventListener('focus', function() {
                    this.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                });

                card.addEventListener('click', function() {
                    window.location.href = fileUrl;
                });

                grid.appendChild(card);
            });
            
            CONTENT_SIDE.appendChild(grid);
        }

        // ==================== BỘ ĐIỀU HƯỚNG BẮT PHÍM REMOTE TUYỆT ĐỐI ====================
        document.addEventListener('keydown', function(e) {
            const active = document.activeElement;
            if (!active) return;

            // NẾU ĐANG Ở CỘT MENU TRÁI
            if (active.classList.contains('menu-item')) {
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    // Bấm PHẢI -> Nhảy sang ô App đầu tiên bên phải
                    const firstApp = CONTENT_SIDE.querySelector('.tv-focusable');
                    if (firstApp) firstApp.focus();
                }
            } 
            // NẾU ĐANG Ở CỘT APP BÊN PHẢI
            else if (active.classList.contains('tv-focusable')) {
                if (e.key === 'ArrowLeft') {
                    // Kiểm tra xem có đang ở cột đầu tiên của lưới bên phải hay không
                    // Để đơn giản và chính xác nhất: Bấm TRÁI là trả focus về Menu đang active
                    e.preventDefault();
                    const activeMenu = MENU_SIDE.querySelector('.menu-item:focus') || MENU_SIDE.querySelector('.menu-item');
                    if (activeMenu) activeMenu.focus();
                }
            }
        });

        window.onload = init;
    </script>
</body>
</html>
