<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Ứng Dụng ATV</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* TỐI ƯU TOÀN MÀN HÌNH CHO ANDROID TV */
        body { 
            font-family: "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #0f172a; /* Nền tối chuẩn TV */
            color: #f3f4f6; 
            overflow: hidden; /* Khóa cuộn trang chính, chỉ cuộn nội bộ từng cột */
        }

        #loading-overlay { backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }

        /* HIỆU ỨNG FOCUS REMOTE KIỂU NETFLIX */
        .tv-focusable {
            transition: all 0.2s ease-in-out;
            outline: none;
            border: 2px solid transparent;
        }
        
        .tv-focusable:focus {
            transform: scale(1.04);
            border-color: #3b82f6 !important;
            background-color: #2563eb !important; /* Xanh dương nổi bật khi chọn */
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.6) !important;
            z-index: 10;
        }

        .tv-focusable:focus * {
            color: #ffffff !important;
        }

        /* Trạng thái Menu đang được chọn nhưng đang hover/focus bên vùng App */
        .menu-active:not(:focus) {
            background-color: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3) !important;
            color: #60a5fa !important;
        }

        /* Ẩn thanh cuộn mặc định và làm mượt mà cho TV */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col p-6 overflow-hidden">

    <div id="loading-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-900 bg-opacity-90">
        <svg class="animate-spin h-12 w-12 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-lg font-bold text-blue-400">Đang tải dữ liệu ứng dụng...</p>
    </div>

    <div class="flex flex-1 w-full h-full gap-6 overflow-hidden">
        
        <aside class="w-1/4 bg-gray-800/50 border border-gray-700/60 rounded-2xl p-4 flex flex-col overflow-y-auto custom-scrollbar">
            <div class="mb-6 px-2">
                <h1 class="text-2xl font-black text-blue-400 tracking-wide uppercase">KHO ATV</h1>
                <p class="text-xs text-gray-400 mt-1">Hỗ trợ điều khiển Remote</p>
            </div>
            
            <nav id="sidebar-menu" class="space-y-2 flex-1"></nav>
        </aside>

        <main class="flex-1 bg-gray-800/20 border border-gray-800/40 rounded-2xl p-6 flex flex-col overflow-hidden">
            <h2 id="current-category-title" class="text-2xl font-bold text-gray-100 mb-6 border-b border-gray-700 pb-3 flex items-center gap-2">
                ...
            </h2>
            
            <div id="apps-grid-view" class="flex-1 overflow-y-auto custom-scrollbar pr-1">
                <div id="apps-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-6">
                    </div>
            </div>
        </main>

    </div>

    <script>
        const WORKER_URL = "https://twilight-water-52c0.nguyentuanhihihi.workers.dev/"; 
        const R2_PUBLIC_URL = "https://pub-f2fd372ec0c34231b4e0a24526bdb379.r2.dev"; 

        const SIDEBAR_MENU = document.getElementById('sidebar-menu');
        const APPS_GRID = document.getElementById('apps-grid');
        const CAT_TITLE = document.getElementById('current-category-title');
        const LOADING_OVERLAY = document.getElementById('loading-overlay');
        
        let appDataStructure = {};
        let codeMapping = {};
        let folderFriendlyNames = {};
        let fileFriendlyNames = {}; 
        let iconMapping = {};
        let folderCustomOrder = [];
        let guidesData = [];

        async function init() {
            await fetchLatestData();
            // Tự động focus vào mục đầu tiên của Menu để ăn Remote ngay lập tức
            setTimeout(() => {
                const firstMenuBtn = SIDEBAR_MENU.querySelector('.tv-focusable');
                if (firstMenuBtn) firstMenuBtn.focus();
            }, 500);
        }

        async function fetchLatestData() {
            try {
                const response = await fetch(WORKER_URL);
                const data = await response.json();
                processAndRender(data);
            } catch (err) {
                console.error(err);
                document.getElementById('apps-grid-view').innerHTML = '<p class="text-red-500 text-xl font-bold p-10 text-center bg-gray-800 rounded-2xl">Lỗi kết nối máy chủ dữ liệu!</p>';
            } finally {
                LOADING_OVERLAY.style.opacity = '0';
                setTimeout(() => LOADING_OVERLAY.classList.add('hidden'), 300);
            }
        }

        function processAndRender(data) {
            codeMapping = data.codes || {};
            folderFriendlyNames = data.folderMappings || {};
            fileFriendlyNames = data.fileMappings || {}; 
            iconMapping = data.icons || {};
            
            if (codeMapping["_folder_order"]) {
                try { folderCustomOrder = JSON.parse(codeMapping["_folder_order"]); } catch(e) { folderCustomOrder = []; }
            }

            if (codeMapping["_guides_data"]) {
                try { guidesData = JSON.parse(codeMapping["_guides_data"]); } catch(e) { guidesData = []; }
            } else {
                guidesData = [
                    { text: "Hướng dẫn cài phần mềm cho tivi", url: "https://sites.google.com/view/ewe556/trang-ch%E1%BB%A7" },
                    { text: "Cài đặt mở tivi tự động mở kênh truyền hình", url: "https://youtu.be/8d8CzyAZy0U" }
                ];
            }

            const objects = data.objects || [];
            appDataStructure = {};

            objects.forEach(obj => {
                if (obj.key.endsWith(".json") || obj.key.endsWith(".png") || obj.key.endsWith(".jpg") || obj.key.endsWith(".webp") || obj.key.endsWith(".keep")) return;
                
                const parts = obj.key.split('/');
                let category = parts.length >= 2 ? parts[0] : "Khác";
                let subcategory = parts.length >= 3 ? parts[1] : null;

                if (!appDataStructure[category]) appDataStructure[category] = { _files: [], _subs: {} };

                if (subcategory) {
                    if (!appDataStructure[category]._subs[subcategory]) appDataStructure[category]._subs[subcategory] = [];
                    appDataStructure[category]._subs[subcategory].push(obj);
                } else {
                    appDataStructure[category]._files.push(obj);
                }
            });

            renderInterface();
        }

        function getFolderName(slug) {
            return folderFriendlyNames[slug] || slug.toUpperCase().replace(/_/g, ' ');
        }

        // TẠO GIAO DIỆN CHÍNH 2 CỘT
        function renderInterface() {
            SIDEBAR_MENU.innerHTML = "";
            
            // 1. Tạo mục Hướng Dẫn Sử Dụng đầu tiên trên Menu
            createMenuButton("guides-menu-item", "📖 Hướng Dẫn Sử Dụng", () => {
                renderGuidesContent();
            });

            // 2. Lấy danh sách các Thư mục Ứng dụng
            let categories = Object.keys(appDataStructure);
            
            // Nếu có cấu hình sắp xếp thư mục custom, áp dụng nó
            if (folderCustomOrder && folderCustomOrder.length > 0) {
                categories.sort((a, b) => {
                    let indexA = folderCustomOrder.indexOf(a);
                    let indexB = folderCustomOrder.indexOf(b);
                    if (indexA === -1) indexA = 999;
                    if (indexB === -1) indexB = 999;
                    return indexA - indexB;
                });
            }

            // Sinh các nút Menu cho Thư mục ứng dụng
            categories.forEach(catSlug => {
                const prettyName = getFolderName(catSlug);
                createMenuButton(`cat-${catSlug}`, `📁 ${prettyName}`, () => {
                    renderAppContent(catSlug);
                });
            });
        }

        // HÀM TẠO NÚT MENU Ở CỘT TRÁI (TỐI ƯU SỰ KIỆN FOCUS REMOTE)
        function createMenuButton(id, text, loadContentFn) {
            const btn = document.createElement('button');
            btn.id = id;
            btn.className = "tv-focusable w-full text-left text-lg font-bold text-gray-400 py-3 px-4 rounded-xl transition-all block truncate";
            btn.innerText = text;

            // KHI DI CHUYỂN REMOTE TỚI (FOCUS): Tự động nạp dữ liệu sang phải luôn, không cần nhấn OK
            btn.onfocus = () => {
                document.querySelectorAll('.menu-active').forEach(el => el.classList.remove('menu-active'));
                btn.classList.add('menu-active');
                loadContentFn();
            };

            // KHI NHẤN OK (CLICK): Nhảy nhanh focus sang app đầu tiên ở cột phải cho tiện
            btn.onclick = () => {
                loadContentFn();
                setTimeout(() => {
                    const firstAppCard = APPS_GRID.querySelector('.tv-focusable');
                    if (firstAppCard) firstAppCard.focus();
                }, 100);
            };

            SIDEBAR_MENU.appendChild(btn);
        }

        // RENDER NỘI DUNG MỤC HƯỚNG DẪN
        function renderGuidesContent() {
            CAT_TITLE.innerHTML = `<span>📖</span> Hướng Dẫn Sử Dụng`;
            APPS_GRID.innerHTML = "";

            if (guidesData.length === 0) {
                APPS_GRID.innerHTML = '<p class="text-gray-500 italic col-span-full p-4">Không có hướng dẫn nào.</p>';
                return;
            }

            guidesData.forEach(guide => {
                const hrefUrl = guide.url && guide.url.trim() !== "" ? guide.url : "#";
                const card = document.createElement('a');
                card.href = hrefUrl;
                card.className = "tv-focusable block bg-gray-800 border border-gray-700/60 rounded-xl p-4 flex items-center space-x-4 shadow-md cursor-pointer";
                card.setAttribute('tabindex', '0');
                card.innerHTML = `
                    <span class="text-blue-400 text-2xl flex-shrink-0">👉</span>
                    <span class="text-base font-bold text-gray-200 truncate">${guide.text}</span>
                `;
                
                // Đồng bộ chuyển hướng hoặc kích hoạt khi bấm trên Android TV
                card.addEventListener('click', function(e) {
                    if (hrefUrl !== "#") window.location.href = hrefUrl;
                });

                APPS_GRID.appendChild(card);
            });
        }

        // RENDER NỘI DUNG CÁC APP TRONG THƯ MỤC
        function renderAppContent(catSlug) {
            const catData = appDataStructure[catSlug];
            CAT_TITLE.innerHTML = `<span>📁</span> ${getFolderName(catSlug)}`;
            APPS_GRID.innerHTML = "";
            
            // Gộp cả file gốc và file trong thư mục con vào chung 1 danh sách hiển thị dạng lưới
            let allApps = [...catData._files];
            Object.values(catData._subs).forEach(subList => allApps.push(...subList));
            
            if (allApps.length === 0) {
                APPS_GRID.innerHTML = '<p class="text-gray-500 italic col-span-full p-4">Thư mục này hiện chưa có ứng dụng.</p>';
                return;
            }

            allApps.forEach(file => {
                APPS_GRID.appendChild(createAppCard(file));
            });
        }

        // BIẾN THẺ APP THÀNH MỘT NÚT BẤM DÀNH CHO TIVI (ĐỂ JAVA CHẶN TẢI XUỐNG)
        function createAppCard(file) {
            const rawFileName = file.key.split('/').pop();
            const defaultName = rawFileName.replace(/\.apk$/i, '').replace(/_/g, ' ');
            const cleanName = fileFriendlyNames[file.key] || defaultName;
            
            const initialLetter = cleanName.trim().charAt(0).toUpperCase();
            let avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(initialLetter)}&background=1e293b&color=38bdf8&bold=true&size=128`;
            if (iconMapping[file.key]) avatarUrl = `${R2_PUBLIC_URL}/${iconMapping[file.key]}`;
            
            const fileCode = codeMapping[file.key] || "K có";
            const fileUrl = `${R2_PUBLIC_URL}/${file.key}`;

            const linkCard = document.createElement('a');
            linkCard.className = "tv-focusable block bg-gray-800 border border-gray-700/60 rounded-2xl p-4 flex items-center justify-between shadow-lg cursor-pointer";
            linkCard.setAttribute('tabindex', '0');
            linkCard.innerHTML = `
                <div class="flex items-center space-x-4 min-w-0 flex-1">
                    <img src="${avatarUrl}" class="w-12 h-12 rounded-xl shadow-inner object-cover flex-shrink-0" alt="Icon">
                    <div class="min-w-0 flex-1">
                        <h3 class="text-base font-bold text-gray-100 truncate">${cleanName}</h3>
                        <p class="text-xs text-gray-400 mt-1 font-mono">CODE: <span class="text-yellow-400 font-bold">${fileCode}</span></p>
                    </div>
                </div>
                <div class="text-blue-400 pl-2 flex-shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                </div>
            `;

            // Ép nhảy link trực tiếp để code Java (LauncherActivity.java) bắt được link tải
            linkCard.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = fileUrl;
            });

            return linkCard;
        }

        window.onload = init;
    </script>
</body>
</html>
