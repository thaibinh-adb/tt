<style>
    /* Layout chia 2 cột: Trái (Menu) 30% - Phải (App) 70% */
    .tv-container { display: flex; height: 80vh; gap: 20px; }
    .menu-side { width: 300px; flex-shrink: 0; overflow-y: auto; padding: 10px; border-right: 1px solid #374151; }
    .content-side { flex-grow: 1; overflow-y: auto; padding: 10px; }
    
    /* Style cho mục menu */
    .menu-item {
        padding: 15px; margin-bottom: 10px; border-radius: 10px;
        background: #1f2937; color: #9ca3af; font-weight: bold;
        transition: all 0.2s;
    }
    .menu-item:focus { background: #3b82f6; color: white; transform: scale(1.02); }
</style>

<div class="tv-container">
    <!-- Cột Menu Trái -->
    <div id="menu-side" class="menu-side"></div>
    
    <!-- Cột Nội dung Phải -->
    <div id="content-side" class="content-side"></div>
</div>

<script>
function renderInterface() {
    const menuSide = document.getElementById('menu-side');
    const contentSide = document.getElementById('content-side');
    menuSide.innerHTML = "";
    
    Object.keys(appDataStructure).forEach((catSlug, index) => {
        const btn = document.createElement('button');
        btn.className = "tv-focusable menu-item w-full text-left";
        btn.innerText = getFolderName(catSlug);
        btn.setAttribute('tabindex', '0');
        
        // Khi nhấn vào menu hoặc focus vào
        btn.onfocus = () => {
            renderAppContent(catSlug); // Tự động load nội dung bên phải
        };
        
        menuSide.appendChild(btn);
    });
}

function renderAppContent(catSlug) {
    const container = document.getElementById('content-side');
    container.innerHTML = `<h2 class="text-2xl font-bold mb-4 text-blue-400">${getFolderName(catSlug)}</h2>`;
    const grid = document.createElement('div');
    grid.className = "grid grid-cols-2 gap-4"; // Cột phải chia lưới 2
    
    const catData = appDataStructure[catSlug];
    let allApps = [...catData._files];
    Object.values(catData._subs).forEach(subList => allApps.push(...subList));
    
    allApps.forEach(file => grid.appendChild(createAppCard(file)));
    container.appendChild(grid);
}
</script>
