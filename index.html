<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Ứng Dụng ATV</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* TỐI ƯU GIAO DIỆN DÀNH RIÊNG CHO TIVI */
        body { 
            font-family: "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #0f172a; /* Nền tối dịu mắt cho TV */
            color: #f3f4f6; 
            overflow-x: hidden;
        }
        
        .subcontent-transition { transition: max-height 0.3s ease-out, opacity 0.2s ease-out; overflow: hidden; }
        #loading-overlay { backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .rotate-180 { transform: rotate(180deg); }

        /* HIỆU ỨNG KHI DÙNG REMOTE CHỌN TRÚNG (FOCUS) - QUAN TRỌNG NHẤT */
        .tv-focusable {
            transition: all 0.2s ease-in-out;
            outline: none; /* Bỏ viền mặc định xấu xí của trình duyệt */
        }
        
        .tv-focusable:focus {
            transform: scale(1.05);
            border-color: #3b82f6 !important;
            background-color: #1e3a8a !important; /* Xanh dương đậm tỏa sáng */
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.8) !important;
            z-index: 10;
        }

        .tv-focusable:focus * {
            color: #ffffff !important;
        }

        /* Ẩn thanh cuộn cho đẹp trên TV */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="min-h-screen pb-16">

    <div id="loading-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-900 bg-opacity-90">
        <svg class="animate-spin h-12 w-12 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-lg font-bold text-blue-400">Đang tải dữ liệu, vui lòng đợi...</p>
    </div>

    <header class="bg-gradient-to-r from-gray-900 to-gray-800 border-b border-gray-700 shadow-2xl mb-8 py-8">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-4xl md:text-5xl font-black text-blue-400 tracking-tight mb-2">
                KHO ỨNG DỤNG ANDROID TV
            </h1>
            <p class="text-lg text-gray-400 font-medium">Sử dụng phím điều hướng trên Remote để chọn tải phần mềm</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <section class="mb-10 bg-gray-800/60 border border-gray-700 rounded-2xl overflow-hidden shadow-xl">
            <button onclick="toggleGuideAccordion()" class="tv-focusable w-full text-left bg-blue-700 px-6 py-5 flex justify-between items-center">
                <h3 class="text-xl font-bold text-white flex items-center gap-3">
                    💡 MẸO & HƯỚNG DẪN CÀI ĐẶT
                </h3>
                <svg id="guide-arrow" class="w-8 h-8 text-white transform transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
            
            <div id="guide-content" class="subcontent-transition max-h-0 opacity-0 bg-gray-800">
                <div id="guide-list-container" class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-gray-700">
                    </div>
            </div>
        </section>

        <section id="main-content" class="space-y-6"></section>
    </main>

    <script>
        const WORKER_URL = "https://twilight-water-52c0.nguyentuanhihihi.workers.dev/"; 
        const R2_PUBLIC_URL = "https://pub-f2fd372ec0c34231b4e0a24526bdb379.r2.dev"; 

        const MAIN_CONTENT = document.getElementById('main-content');
        const LOADING_OVERLAY = document.getElementById('loading-overlay');
        
        let appDataStructure = {};
        let codeMapping = {};
        let folderFriendlyNames = {};
        let fileFriendlyNames = {}; 
        let iconMapping = {};
        let folderCustomOrder = [];
        let guidesData = [];

        async function init() {
            await fetchLatestData();
            // Tự động focus vào mục đầu tiên trên màn hình sau khi tải xong để remote ăn liền
            setTimeout(() => {
                const firstFocusable = document.querySelector('.tv-focusable');
                if(firstFocusable) firstFocusable.focus();
            }, 500);
        }

        async function fetchLatestData() {
            try {
                const response = await fetch(WORKER_URL);
                const data = await response.json();
                processAndRender(data);
            } catch (err) {
                console.error(err);
                MAIN_CONTENT.innerHTML = '<p class="text-red-500 text-2xl font-bold p-10 text-center bg-gray-800 rounded-2xl">Lỗi kết nối máy chủ dữ liệu!</p>';
            } finally {
                LOADING_OVERLAY.style.opacity = '0';
                setTimeout(() => LOADING_OVERLAY.classList.add('hidden'), 300);
            }
        }

        function processAndRender(data) {
            codeMapping = data.codes || {};
            folderFriendlyNames = data.folderMappings || {};
            fileFriendlyNames = data.fileMappings || {}; 
            iconMapping = data.icons || {};
            
            if (codeMapping["_folder_order"]) {
                try { folderCustomOrder = JSON.parse(codeMapping["_folder_order"]); } catch(e) { folderCustomOrder = []; }
            }

            if (codeMapping["_guides_data"]) {
                try { guidesData = JSON.parse(codeMapping["_guides_data"]); } catch(e) { guidesData = []; }
            } else {
                guidesData = [
                    { text: "Hướng dẫn cài phần mềm cho tivi", url: "https://sites.google.com/view/ewe556/trang-ch%E1%BB%A7" },
                    { text: "Cài đặt mở tivi tự động mở kênh truyền hình", url: "https://youtu.be/8d8CzyAZy0U" }
                ];
            }

            const objects = data.objects || [];
            appDataStructure = {};

            objects.forEach(obj => {
                if (obj.key.endsWith(".json") || obj.key.endsWith(".png") || obj.key.endsWith(".jpg") || obj.key.endsWith(".webp") || obj.key.endsWith(".keep")) return;
                
                const parts = obj.key.split('/');
                let category = parts.length >= 2 ? parts[0] : "Khác";
                let subcategory = parts.length >= 3 ? parts[1] : null;

                if (!appDataStructure[category]) appDataStructure[category] = { _files: [], _subs: {} };

                if (subcategory) {
                    if (!appDataStructure[category]._subs[subcategory]) appDataStructure[category]._subs[subcategory] = [];
                    appDataStructure[category]._subs[subcategory].push(obj);
                } else {
                    appDataStructure[category]._files.push(obj);
                }
            });

            renderInterface();
        }

        function renderGuides() {
            const container = document.getElementById('guide-list-container');
            container.innerHTML = '';

            guidesData.forEach(guide => {
                const hrefUrl = guide.url && guide.url.trim() !== "" ? guide.url : "#";
                const guideItem = document.createElement('a');
                guideItem.href = hrefUrl;
                guideItem.className = "tv-focusable block bg-gray-700/50 hover:bg-gray-700 p-4 rounded-xl flex items-center space-x-4 border border-gray-600";
                
                guideItem.innerHTML = `
                    <span class="text-blue-400 text-2xl">👉</span>
                    <span class="text-lg font-bold text-gray-200 truncate">${guide.text}</span>
                `;
                container.appendChild(guideItem);
            });
        }

        function getFolderName(slug) {
            return folderFriendlyNames[slug] || slug.toUpperCase().replace(/_/g, ' ');
        }

        function renderInterface() {
            MAIN_CONTENT.innerHTML = "";
            renderGuides();

            let categoriesSorted = Object.keys(appDataStructure);
            if (folderCustomOrder.length > 0) {
                categoriesSorted.sort((a, b) => {
                    let idxA = folderCustomOrder.indexOf(a);
                    let idxB = folderCustomOrder.indexOf(b);
                    if (idxA === -1) idxA = 999;
                    if (idxB === -1) idxB = 999;
                    return idxA - idxB;
                });
            }

            categoriesSorted.forEach((catSlug, index) => {
                const catData = appDataStructure[catSlug];
                const catElement = document.createElement('div');
                catElement.className = "bg-gray-800/40 border border-gray-700 rounded-2xl shadow-xl overflow-hidden mb-6";
                
                catElement.innerHTML = `
                    <button onclick="toggleAccordion('content-${index}', 'arrow-${index}')" class="tv-focusable w-full px-6 py-5 flex justify-between items-center bg-gray-800">
                        <div class="flex items-center space-x-4">
                            <span class="text-3xl">📁</span>
                            <h2 class="text-2xl font-bold text-gray-100 tracking-wide">${getFolderName(catSlug)}</h2>
                        </div>
                        <svg id="arrow-${index}" class="w-8 h-8 text-gray-400 transform transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div id="content-${index}" class="subcontent-transition max-h-0 opacity-0 bg-gray-900/40 root-accordion-content">
                        <div class="p-6 space-y-6" id="container-inside-${index}"></div>
                    </div>
                `;

                MAIN_CONTENT.appendChild(catElement);
                const insideContainer = document.getElementById(`container-inside-${index}`);

                // Hiển thị file cấp 1
                if (catData._files.length > 0) {
                    const gridFiles = document.createElement('div');
                    gridFiles.className = "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6";
                    catData._files.forEach(file => {
                        gridFiles.appendChild(createAppCard(file));
                    });
                    insideContainer.appendChild(gridFiles);
                }

                // Hiển thị thư mục con (cấp 2)
                Object.keys(catData._subs).forEach((subSlug) => {
                    const subFiles = catData._subs[subSlug];
                    const subWrapper = document.createElement('div');
                    subWrapper.className = "border border-gray-700 bg-gray-800/80 rounded-2xl overflow-hidden shadow-md";
                    
                    subWrapper.innerHTML = `
                        <button onclick="toggleSubAccordion('subcontent-${catSlug}-${subSlug}', 'subarrow-${catSlug}-${subSlug}', '${catSlug}')" 
                             class="tv-focusable w-full flex justify-between items-center px-5 py-4 bg-gray-700/30">
                            <h4 class="text-xl font-bold text-teal-400 flex items-center gap-3">
                                <span>📂</span> ${getFolderName(subSlug)}
                            </h4>
                            <svg id="subarrow-${catSlug}-${subSlug}" class="w-6 h-6 text-gray-400 transform transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>
                        <div id="subcontent-${catSlug}-${subSlug}" class="subcontent-transition max-h-0 opacity-0 bg-gray-900/60 sub-accordion-content" data-parent="${catSlug}">
                            <div class="p-5" id="subcontent-inside-${catSlug}-${subSlug}"></div>
                        </div>
                    `;

                    insideContainer.appendChild(subWrapper);
                    const subInside = document.getElementById(`subcontent-inside-${catSlug}-${subSlug}`);

                    const gridSubFiles = document.createElement('div');
                    gridSubFiles.className = "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5";
                    subFiles.forEach(file => { gridSubFiles.appendChild(createAppCard(file)); });
                    subInside.appendChild(gridSubFiles);
                });
            });
        }

        // BIẾN THẺ APP THÀNH MỘT NÚT BẤM (LINK TẢI) DÀNH CHO TIVI
        function createAppCard(file) {
            const rawFileName = file.key.split('/').pop();
            const defaultName = rawFileName.replace(/\.apk$/i, '').replace(/_/g, ' ');
            const cleanName = fileFriendlyNames[file.key] || defaultName;
            
            const initialLetter = cleanName.trim().charAt(0).toUpperCase();
            let avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(initialLetter)}&background=1e293b&color=38bdf8&bold=true&size=128`;
            if (iconMapping[file.key]) avatarUrl = `${R2_PUBLIC_URL}/${iconMapping[file.key]}`;
            
            const fileCode = codeMapping[file.key] || "K có";
            const fileUrl = `${R2_PUBLIC_URL}/${file.key}`;

            const linkCard = document.createElement('a');
            linkCard.href = fileUrl; // Khi bấm OK trên remote, tự động bắt link tải
            linkCard.className = "tv-focusable block bg-gray-800 border border-gray-600 rounded-2xl p-4 flex items-center justify-between shadow-lg";
            
            linkCard.innerHTML = `
                <div class="flex items-center space-x-4 min-w-0 flex-1">
                    <img src="${avatarUrl}" class="w-14 h-14 rounded-xl shadow-inner object-cover" alt="Icon">
                    <div class="min-w-0 flex-1">
                        <h3 class="text-xl font-bold text-gray-100 truncate">${cleanName}</h3>
                        <p class="text-sm text-gray-400 mt-1 font-mono">CODE: <span class="text-yellow-400 font-bold">${fileCode}</span></p>
                    </div>
                </div>
                <div class="text-blue-500 pl-3">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                </div>
            `;
            return linkCard;
        }

        // HÀM MỞ THƯ MỤC
        function toggleAccordion(contentId, arrowId) {
            const content = document.getElementById(contentId);
            const arrow = document.getElementById(arrowId);
            const isOpening = !(content.style.maxHeight && content.style.maxHeight !== '0px');

            document.querySelectorAll('.root-accordion-content').forEach(el => { el.style.maxHeight = '0px'; el.style.opacity = '0'; });
            document.querySelectorAll('[id^="arrow-"]').forEach(el => el.classList.remove('rotate-180'));
            
            const guide = document.getElementById('guide-content');
            if (guide) { guide.style.maxHeight = '0px'; guide.style.opacity = '0'; document.getElementById('guide-arrow').classList.remove('rotate-180'); }

            if (isOpening) {
                content.style.maxHeight = content.scrollHeight + '1000px'; // Mở rộng rãi cho file load
                content.style.opacity = '1';
                arrow.classList.add('rotate-180');
                setTimeout(() => { content.style.maxHeight = 'none'; }, 300);
            }
        }

        function toggleGuideAccordion() {
            const content = document.getElementById('guide-content');
            const arrow = document.getElementById('guide-arrow');
            const isOpening = !(content.style.maxHeight && content.style.maxHeight !== '0px');

            document.querySelectorAll('.root-accordion-content').forEach(el => { el.style.maxHeight = '0px'; el.style.opacity = '0'; });
            document.querySelectorAll('[id^="arrow-"]').forEach(el => el.classList.remove('rotate-180'));

            if (isOpening) {
                content.style.maxHeight = content.scrollHeight + 'px';
                content.style.opacity = '1';
                arrow.classList.add('rotate-180');
            } else {
                content.style.maxHeight = '0px';
                content.style.opacity = '0';
                arrow.classList.remove('rotate-180');
            }
        }

        function toggleSubAccordion(subContentId, subArrowId, parentSlug) {
            const content = document.getElementById(subContentId);
            const arrow = document.getElementById(subArrowId);
            const isOpening = !(content.style.maxHeight && content.style.maxHeight !== '0px');

            document.querySelectorAll(`.sub-accordion-content[data-parent="${parentSlug}"]`).forEach(el => {
                el.style.maxHeight = '0px'; el.style.opacity = '0';
                document.getElementById(el.id.replace('subcontent-', 'subarrow-')).classList.remove('rotate-180');
            });

            if (isOpening) {
                content.style.maxHeight = content.scrollHeight + '1000px';
                content.style.opacity = '1';
                arrow.classList.add('rotate-180');
                const parentAccordion = content.closest('.root-accordion-content');
                if (parentAccordion && parentAccordion.style.maxHeight !== 'none') parentAccordion.style.maxHeight = 'none';
                setTimeout(() => { content.style.maxHeight = 'none'; }, 300);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
